      rgba(4,10,25,0.0)  0%,
      rgba(4,10,25,0.0)  30%,
      rgba(4,10,25,0.38) 48%,

  /* Vertically centred — top: 50% transform trick */
  .caption-block {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
  }

  .swirls-top {
    width: 420px; height: 44px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 0.2s;
  }

    background-clip: text;

            drop-shadow(0 2px 5px rgba(0,0,30,0.9));
    opacity: 0;
    animation: riseIn 1.4s cubic-bezier(0.2,0.8,0.4,1) forwards 0.3s;
    padding: 0 18px;
  }
  .swirls-bottom {
    width: 360px; height: 32px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards 0.7s;
    margin-top: -2px;
  }

  .sparkle {
    position: absolute;
    z-index: 6;
    opacity: 0;
    animation: twinkle 2.2s ease-in-out infinite;
    color: #c8e8ff;
    filter: drop-shadow(0 0 7px rgba(160,215,255,0.95));
  }
  .s1 { top: 44%;  left: 38px;  font-size: 22px; animation-delay: 0.2s; }
  .s2 { top: 44%;  right: 42px; font-size: 20px; animation-delay: 0.6s; }
  .s3 { top: 52%;  left: 18px;  font-size: 13px; animation-delay: 1.0s; }
  .s4 { top: 52%;  right: 20px; font-size: 13px; animation-delay: 0.4s; }
  .s5 { top: 40%;  left: 46%;   font-size: 10px; animation-delay: 0.8s; }

  @keyframes twinkle {
    0%,100% { opacity: 0.25; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
